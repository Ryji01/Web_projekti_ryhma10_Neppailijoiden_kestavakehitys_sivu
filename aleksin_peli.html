<body class="d-flex flex-column min-vh-100">
    <!-- Jyrin header alkaa tästä -->
    <nav class="navbar navbar-expand-lg" style="background-color: #1f8e00;"> <!-- headerin väri -->
        <div class="container-fluid">
            <i class="bi bi-house-door-fill"></i>
            <a class="navbar-brand" href="#">Kestävä kehitys</a>
            <!-- Otsikko, linkki pääsivulle pitää lisätä tähän nappiin -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="#"><i class="bi bi-question-circle-fill"></i>
                            Infosivu</a>
                        <!-- linkki infosivulle puuttuu -->
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#"><i class="bi bi-trophy-fill"></i> Kooste</a>
                        <!-- linkki koostesivulle puuttuu -->
                    </li>
                </ul>
                </li>
                </ul>
                </form>
            </div>
        </div>
    </nav>
    <!-- Header loppuu -->

    <!-- PELI -->
    <div class="container text-center mt-5">
        <h2>Hyvä vai huono teko? 🌱</h2>

        <div class="mt-4 p-4 border rounded bg-light">
            <p id="questionNumber"><strong>Kysymys 1 / 10</strong></p>
            <h4 id="question">Kysymys tulee tähän</h4>

            <div class="mt-4">
                <button class="btn btn-success me-3" onclick="answer('good')">
                    👍 Hyvä
                </button>
                <button class="btn btn-danger" onclick="answer('bad')">
                    👎 Huono
                </button>
            </div>

            <p class="mt-3" id="feedback"></p>
            <p>Pisteet: <span id="score">0</span> / 10</p>
            
            <button id="nextBtn" class="btn btn-warning mt-3" onclick="nextQuestion()" style="display: none;">Seuraava kysymys
            </button>

            <button id="restartBtn" class="btn btn-primary mt-3" onclick="restartGame()" style="display: none;">Pelaa uudestaan
            </button>
        </div>
    </div>

    <!-- aleksin footer alkaa -->
<footer class="text-lg-start mt-auto" style="background-color: #1f8e00; padding: 1rem 0;"> <!-- footerin väri ja padding -->
  <div class="container"> <!--keskittää ja rajaa-->
    <div class="row align-items-center"> <!--kohdistaa kolumnit keskelle-->

      <!-- Teksti -->
      <div class="col-12 col-md-4">
        <h6 class="text-uppercase fw-bold mb-1">Yhteyshenkilöt</h6>
        <p>Aleksi Junttila</p>
        <p>Jyri Holm</p>
        <p>Sampsa Hanhela</p>
      </div>

      <!-- Logo -->
      <div class="col-12 col-md-4">
        <img src="./img/logo.png"
             class="img-fluid border rounded"
             style="max-width: 140px;">
      </div>

      <!-- oamk logo -->
      <div class="col-12 col-md-4">
      <img src="./img/oamk.png"
        class="img-fluid border rounded"
        style="max-width: 140px;">
      </div>

    </div>
  </div>
